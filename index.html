
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPL Crunch '26 — Data Analytics</title>
<style>
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0D1117}
</style>
</head>
<body>

<style>
*{box-sizing:border-box;margin:0;padding:0}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:250% center}100%{background-position:-100% center}}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.pu{animation:fadeUp 0.5s ease both}
</style>

<div id="app" style="width:100%;height:100vh;min-height:500px;background:#0D1117;border-radius:0;overflow:hidden;position:relative;font-family:'Inter',system-ui,sans-serif">

<!-- SILK CANVAS (hero+surprise) -->
<canvas id="silk" style="position:absolute;inset:0;width:100%;height:100%;opacity:0;pointer-events:none;transition:opacity 0.5s"></canvas>

<!-- LOADER -->
<div id="loader" style="position:absolute;inset:0;background:#0D1117;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50">
  <svg id="sp" width="200" height="200" viewBox="0 0 200 200"></svg>
  <p style="color:#8B949E;font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-top:14px;animation:pulse 1.8s infinite">Analysing 289,673 deliveries...</p>
</div>

<!-- DASHBOARD -->
<div id="db" style="display:none;position:absolute;inset:0">
  <div id="topbar" style="position:absolute;top:11px;left:13px;display:flex;align-items:center;gap:8px;z-index:30">
    <svg width="20" height="20" viewBox="0 0 100 100" style="animation:spin 8s linear infinite;flex-shrink:0">
      <defs><radialGradient id="rg" cx="38%" cy="35%" r="60%"><stop offset="0%" stop-color="#c0392b"/><stop offset="40%" stop-color="#96281b"/><stop offset="100%" stop-color="#5d1008"/></radialGradient></defs>
      <circle cx="50" cy="50" r="46" fill="url(#rg)"/>
      <path d="M50 6C30 20,70 40,50 50C30 60,70 80,50 94" fill="none" stroke="#f5e6c8" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M4 50C20 38,80 38,96 50C80 62,20 62,4 50" fill="none" stroke="#f5e6c8" stroke-width="2" opacity="0.7"/>
    </svg>
    <span id="pagetag" style="color:#D4AF37;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase">IPL CRUNCH '26</span>
  </div>
  <div id="dots" style="position:absolute;right:11px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px;z-index:30"></div>
  <div id="lbl" style="position:absolute;bottom:9px;left:50%;transform:translateX(-50%);color:#8B949E;font-size:8px;letter-spacing:2.5px;text-transform:uppercase;z-index:30"></div>
  <div id="pages" style="position:absolute;inset:0"></div>
  <div id="khint" style="position:absolute;bottom:9px;right:36px;color:#3d4451;font-size:7.5px;letter-spacing:2px;text-transform:uppercase;z-index:30;transition:opacity 2s;pointer-events:none">↑ ↓ scroll</div>
</div>
</div>

<script>
// ── DATA ────────────────────────────────────────────────────────
const PH=[
  {n:'Powerplay',o:'1–6', w:50.8,l:44.6,d:6.2, r:0.238,c:'#1F6FEB'},
  {n:'Middle',   o:'7–15',w:77.3,l:65.6,d:11.7,r:0.333,c:'#D4AF37'},
  {n:'Death',    o:'16–20',w:55.7,l:46.3,d:9.4, r:0.298,c:'#238636'},
];
const BAT=[
  {n:'Shubman Gill',    runs:2827,sr:150.5,wp:75.1},
  {n:'Virat Kohli',     runs:2757,sr:144.1,wp:66.6},
  {n:'Jos Buttler',     runs:2487,sr:149.4,wp:66.7},
  {n:'KL Rahul',        runs:2401,sr:142.2,wp:52.5},
  {n:'Y. Jaiswal',      runs:2189,sr:156.2,wp:57.7},
];
const BWL=[
  {n:'YS Chahal',     wkts:90,econ:8.82,wp:71.1},
  {n:'Arshdeep Singh',wkts:78,econ:9.44,wp:56.4},
  {n:'Rashid Khan',   wkts:76,econ:8.23,wp:61.8},
  {n:'Bhuvneshwar K.',wkts:74,econ:8.65,wp:59.5},
  {n:'CV Varun',      wkts:74,econ:8.34,wp:75.7},
];
const HERD=[
  {s:"'16",fp:55,wr:65},{s:"'17",fp:64,wr:54},{s:"'18",fp:67,wr:53},
  {s:"'19",fp:75,wr:58},{s:"'20",fp:83,wr:48},{s:"'21",fp:85,wr:62},
  {s:"'22",fp:80,wr:49},{s:"'23",fp:72,wr:43},{s:"'24",fp:77,wr:47},
  {s:"'25",fp:80,wr:50},{s:"'26",fp:78,wr:57},
];
const PPW=[{w:'0',wr:57.0},{w:'1',wr:47.9},{w:'2',wr:38.9},{w:'3',wr:24.6},{w:'4+',wr:16.3}];
const MLF=[
  {l:'Middle Run Rate',rf:18.8,c:'#D4AF37'},{l:'Death Run Rate',rf:16.7,c:'#238636'},
  {l:'Death Runs',rf:15.2,c:'#238636'},{l:'Middle Runs',rf:16.5,c:'#D4AF37'},
  {l:'Powerplay RR',rf:11.2,c:'#1F6FEB'},{l:'Powerplay Runs',rf:9.2,c:'#1F6FEB'},
  {l:'PP Wickets Lost',rf:4.5,c:'#DA3633'},
];

// ── SVG CHART BUILDERS ───────────────────────────────────────────

function svgPhase(){
  const W=300,H=175,pL=32,pR=8,pT=24,pB=38,iW=W-pL-pR,iH=H-pT-pB,max=90;
  const gW=iW/3; const bW=gW*0.32;
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
  <rect width="${W}" height="${H}" fill="#0f1117"/>
  <text x="${W/2}" y="13" text-anchor="middle" fill="#E6EDF3" font-size="9.5" font-weight="700">Avg runs per phase: Winners vs Losers (Innings 1)</text>
  <line x1="${pL}" y1="${pT+iH}" x2="${W-pR}" y2="${pT+iH}" stroke="#21262D"/>
  <line x1="${pL}" y1="${pT}" x2="${pL}" y2="${pT+iH}" stroke="#21262D"/>`;
  [0,30,60,90].forEach(v=>{const y=pT+iH-(v/max)*iH;s+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#21262D" stroke-dasharray="2"/>
  <text x="${pL-4}" y="${y+3.5}" text-anchor="end" fill="#8B949E" font-size="8.5">${v}</text>`;});
  PH.forEach((p,i)=>{
    const x=pL+i*gW+gW/2;
    const wH=(p.w/max)*iH, lH=(p.l/max)*iH;
    s+=`<rect x="${x-bW-2}" y="${pT+iH-wH}" width="${bW}" height="${wH}" fill="${p.c}" rx="2" opacity="0.9"/>`;
    s+=`<text x="${x-bW/2-2}" y="${pT+iH-wH-5}" text-anchor="middle" fill="${p.c}" font-size="9.5" font-weight="700">${p.w}</text>`;
    s+=`<rect x="${x+2}" y="${pT+iH-lH}" width="${bW}" height="${lH}" fill="#DA3633" rx="2" opacity="0.75"/>`;
    s+=`<text x="${x+bW/2+2}" y="${pT+iH-lH-5}" text-anchor="middle" fill="#DA3633" font-size="9.5">${p.l}</text>`;
    s+=`<text x="${x}" y="${H-pB+14}" text-anchor="middle" fill="${p.c}" font-size="9.5" font-weight="${i===1?'700':'500'}">${p.n}</text>`;
    s+=`<text x="${x}" y="${H-pB+25}" text-anchor="middle" fill="#8B949E" font-size="8.5">Ov ${p.o}</text>`;
    if(i===1)s+=`<text x="${x}" y="${pT+iH-Math.max(wH,lH)-16}" text-anchor="middle" fill="#D4AF37" font-size="10" font-weight="700">★ +${p.d} runs</text>`;
  });
  s+=`<rect x="${pL+4}" y="16" width="8" height="7" fill="#D4AF37" rx="1"/><text x="${pL+15}" y="22" fill="#8B949E" font-size="9">Winners</text>`;
  s+=`<rect x="${pL+62}" y="16" width="8" height="7" fill="#DA3633" rx="1"/><text x="${pL+73}" y="22" fill="#8B949E" font-size="9">Losers</text>`;
  s+=`</svg>`;return s;
}

function svgCorr(){
  const W=300,H=125,bars=PH.map(p=>({n:p.n,r:p.r,c:p.c}));
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block"><rect width="${W}" height="${H}" fill="#0f1117"/>`;
  s+=`<text x="${W/2}" y="14" text-anchor="middle" fill="#E6EDF3" font-size="9.5" font-weight="700">Pearson correlation with winning</text>`;
  bars.forEach((b,i)=>{
    const y=i*32+22; const w=(b.r/0.4)*178;
    s+=`<rect x="76" y="${y}" width="${w}" height="20" fill="${b.c}" rx="3" opacity="${i===1?'1':'0.65'}"/>`;
    s+=`<text x="72" y="${y+14}" text-anchor="end" fill="#8B949E" font-size="9.5">${b.n}</text>`;
    s+=`<text x="${76+w+5}" y="${y+14}" fill="${b.c}" font-size="9.5" font-weight="${i===1?'700':'400'}">r=${b.r}${i===1?' ★':''}</text>`;
  });
  s+=`</svg>`;return s;
}

function svgInn2(){
  const W=300,H=100;
  const data=[{l:'Winning Chasers',v:39.2,c:'#238636'},{l:'Losing Chasers',v:40.1,c:'#DA3633'}];
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block"><rect width="${W}" height="${H}" fill="#0f1117"/>`;
  s+=`<text x="${W/2}" y="13" text-anchor="middle" fill="#E6EDF3" font-size="9.5" font-weight="700">2nd innings death overs (chasing)</text>`;
  data.forEach((d,i)=>{
    const y=i*36+20; const w=(d.v/50)*210;
    s+=`<rect x="100" y="${y}" width="${w}" height="20" fill="${d.c}" rx="3" opacity="${i===0?'0.9':'0.65'}"/>`;
    s+=`<text x="96" y="${y+14}" text-anchor="end" fill="#E6EDF3" font-size="9.5" font-weight="500">${d.l}</text>`;
    s+=`<text x="${100+w+5}" y="${y+14}" fill="${d.c}" font-size="10" font-weight="700">${d.v} runs</text>`;
  });
  s+=`<text x="${W/2}" y="${H-4}" text-anchor="middle" fill="#DA3633" font-size="9">Winners score LESS at death — game already won in middle overs</text>`;
  s+=`</svg>`;return s;
}

function svgHerd(){
  const W=310,H=145,n=HERD.length;
  const pL=14,pR=8,pT=14,pB=36,iW=W-pL-pR,iH=H-pT-pB;
  const bW=iW/n*0.55; const gap=iW/n;
  const minWr=35,maxWr=75;
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block"><rect width="${W}" height="${H}" fill="#0f1117"/>`;
  const base50y=pT+iH-(50-minWr)/(maxWr-minWr)*iH;
  s+=`<line x1="${pL}" y1="${base50y}" x2="${W-pR}" y2="${base50y}" stroke="#8B949E" stroke-dasharray="3" opacity="0.6"/>`;
  s+=`<text x="${W-pR-2}" y="${base50y-3}" text-anchor="end" fill="#8B949E" font-size="8" font-weight="600">50%</text>`;
  HERD.forEach((d,i)=>{
    const x=pL+i*gap+gap/2-bW/2;
    const wrNorm=(d.wr-minWr)/(maxWr-minWr);
    const bH=iH*wrNorm; const by=pT+iH-bH;
    const col=d.wr>=50?'#238636':'#DA3633';
    s+=`<rect x="${x}" y="${by}" width="${bW}" height="${bH}" fill="${col}" rx="2"/>`;
    if(bH>12)s+=`<text x="${x+bW/2}" y="${by-3}" text-anchor="middle" fill="${col}" font-size="7.5" font-weight="700">${d.wr}%</text>`;
    s+=`<text x="${x+bW/2}" y="${pT+iH+10}" text-anchor="middle" fill="#8B949E" font-size="7">'${d.s}</text>`;
  });
  let pts=HERD.map((d,i)=>{const x=pL+i*gap+gap/2;const y=pT+iH-(d.fp-minWr)/(maxWr-minWr)*iH*0.8;return `${x},${y}`;}).join(' ');
  s+=`<polyline points="${pts}" fill="none" stroke="#D4AF37" stroke-width="2"/>`;
  HERD.forEach((d,i)=>{
    const x=pL+i*gap+gap/2;const y=pT+iH-(d.fp-minWr)/(maxWr-minWr)*iH*0.8;
    s+=`<circle cx="${x}" cy="${y}" r="2.5" fill="#D4AF37"/>`;
    if(i%4===0)s+=`<text x="${x}" y="${y-5}" text-anchor="middle" fill="#D4AF37" font-size="7">${d.fp}%</text>`;
  });
  // Legend - positioned with clear space at bottom
  const ly=H-14;
  s+=`<rect x="${pL}" y="${ly-6}" width="7" height="6" fill="#238636" rx="1"/><text x="${pL+10}" y="${ly}" fill="#8B949E" font-size="8">Win ≥50%</text>`;
  s+=`<rect x="${pL+68}" y="${ly-6}" width="7" height="6" fill="#DA3633" rx="1"/><text x="${pL+78}" y="${ly}" fill="#8B949E" font-size="8">Win &lt;50%</text>`;
  s+=`<line x1="${pL+148}" y1="${ly-3}" x2="${pL+162}" y2="${ly-3}" stroke="#D4AF37" stroke-width="2"/><circle cx="${pL+155}" cy="${ly-3}" r="2.5" fill="#D4AF37"/><text x="${pL+166}" y="${ly}" fill="#8B949E" font-size="8">Field-choice %</text>`;
  s+=`</svg>`;return s;
}

function svgPPW(){
  const W=300,H=130,pL=34,pR=12,pT=14,pB=30,iW=W-pL-pR,iH=H-pT-pB;
  const bW=iW/PPW.length*0.62;const gap=iW/PPW.length;
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block"><rect width="${W}" height="${H}" fill="#0f1117"/>`;
  s+=`<line x1="${pL}" y1="${pT+iH}" x2="${W-pR}" y2="${pT+iH}" stroke="#21262D"/>`;
  [0,20,40,60].forEach(v=>{
    const y=pT+iH-(v/70)*iH;
    s+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#21262D" stroke-dasharray="2" opacity="0.6"/>`;
    s+=`<text x="${pL-4}" y="${y+3.5}" text-anchor="end" fill="#8B949E" font-size="8">${v}%</text>`;
  });
  PPW.forEach((d,i)=>{
    const x=pL+i*gap+gap/2-bW/2;
    const bH=(d.wr/70)*iH; const col=d.wr>=50?'#238636':d.wr>=40?'#D4AF37':'#DA3633';
    s+=`<rect x="${x}" y="${pT+iH-bH}" width="${bW}" height="${bH}" fill="${col}" rx="3"/>`;
    s+=`<text x="${x+bW/2}" y="${pT+iH-bH-4}" text-anchor="middle" fill="${col}" font-size="9.5" font-weight="700">${d.wr}%</text>`;
    s+=`<text x="${x+bW/2}" y="${H-pB+12}" text-anchor="middle" fill="#8B949E" font-size="8.5" font-weight="600">${d.w} wkt${d.w==='1'?'':'s'}</text>`;
  });
  s+=`<text x="${W/2}" y="${H-3}" text-anchor="middle" fill="#8B949E" font-size="7.5">Powerplay wickets taken by bowling team</text>`;
  s+=`</svg>`;return s;
}

function svgMLacc(){
  const mods=[{m:'Random Forest',acc:69.3,c:'#D4AF37'},{m:'Gradient Boost',acc:63.1,c:'#238636'},{m:'Logistic Reg.',acc:68.0,c:'#1F6FEB'}];
  const W=300,H=110,pL=10,pR=10,pT=14,pB=8;
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block"><rect width="${W}" height="${H}" fill="#0f1117"/>`;
  mods.forEach((m,i)=>{
    const y=pT+i*28; const w=(m.acc/100)*(W-pL-pR-55);
    s+=`<text x="${pL}" y="${y+11}" fill="#8B949E" font-size="8">${m.m}</text>`;
    s+=`<rect x="${pL+92}" y="${y}" width="${w}" height="14" fill="${m.c}" rx="3" opacity="0.85"/>`;
    s+=`<text x="${pL+92+w+5}" y="${y+10}" fill="${m.c}" font-size="9" font-weight="700">${m.acc}%</text>`;
  });
  s+=`<text x="${W/2}" y="${H-1}" text-anchor="middle" fill="#8B949E" font-size="7">Test accuracy · pure in-match features · zero toss bias</text>`;
  s+=`</svg>`;return s;
}

function svgMLfeat(){
  const W=300,H=148;
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block"><rect width="${W}" height="${H}" fill="#0f1117"/>`;
  s+=`<text x="4" y="10" fill="#8B949E" font-size="8">Feature importance (Random Forest)</text>`;
  MLF.forEach((f,i)=>{
    const y=14+i*19; const w=(f.rf/22)*180;
    s+=`<text x="4" y="${y+10}" fill="#E6EDF3" font-size="8">${f.l}</text>`;
    s+=`<rect x="112" y="${y}" width="${w}" height="12" fill="${f.c}" rx="2" opacity="${i<2?'1':'0.7'}"/>`;
    s+=`<text x="${112+w+4}" y="${y+9}" fill="${f.c}" font-size="8" font-weight="${i===0?'700':'400'}">${f.rf}%${i===0?' ★':''}</text>`;
  });
  s+=`</svg>`;return s;
}

function svgBatters(){
  const W=300,H=178,maxR=2900;
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block"><rect width="${W}" height="${H}" fill="#0f1117"/>`;
  s+=`<text x="4" y="11" fill="#E6EDF3" font-size="9.5" font-weight="700">Top 5 Batters — gold=wins, grey=losses</text>`;
  BAT.forEach((b,i)=>{
    const y=16+i*32;
    const totalW=(b.runs/maxR)*200; const winW=totalW*(b.wp/100);
    const col=b.wp<55?'#DA3633':'#E6EDF3';
    s+=`<text x="4" y="${y+11}" fill="${col}" font-size="9.5" font-weight="600">${b.n}</text>`;
    s+=`<text x="${W-4}" y="${y+11}" text-anchor="end" fill="#8B949E" font-size="8.5">SR ${b.sr}</text>`;
    s+=`<rect x="4" y="${y+14}" width="${totalW}" height="10" fill="#2D333B" rx="2"/>`;
    s+=`<rect x="4" y="${y+14}" width="${winW}" height="10" fill="${b.wp<55?'#DA3633':'#D4AF37'}" rx="2"/>`;
    s+=`<text x="${4+totalW+4}" y="${y+22}" fill="#8B949E" font-size="8.5">${b.runs.toLocaleString()} · ${b.wp}% wins</text>`;
  });
  s+=`<rect x="4" y="${H-10}" width="8" height="6" fill="#D4AF37" rx="1"/><text x="15" y="${H-5}" fill="#8B949E" font-size="9">Gold = runs in wins</text>`;
  s+=`<rect x="115" y="${H-10}" width="8" height="6" fill="#2D333B" rx="1"/><text x="126" y="${H-5}" fill="#8B949E" font-size="9">Grey = runs in losses</text>`;
  s+=`</svg>`;return s;
}

function svgBowlers(){
  const W=300,H=178,maxW=95;
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block"><rect width="${W}" height="${H}" fill="#0f1117"/>`;
  s+=`<text x="4" y="11" fill="#E6EDF3" font-size="9.5" font-weight="700">Top 5 Bowlers</text>`;
  BWL.forEach((b,i)=>{
    const y=16+i*32;
    const totalW=(b.wkts/maxW)*200; const winW=totalW*(b.wp/100);
    const barCol=b.wp>70?'#D4AF37':'#1F6FEB';
    s+=`<text x="4" y="${y+11}" fill="#E6EDF3" font-size="9.5" font-weight="600">${b.n}</text>`;
    s+=`<text x="${W-4}" y="${y+11}" text-anchor="end" fill="#8B949E" font-size="8.5">Econ ${b.econ}</text>`;
    s+=`<rect x="4" y="${y+14}" width="${totalW}" height="10" fill="#2D333B" rx="2"/>`;
    s+=`<rect x="4" y="${y+14}" width="${winW}" height="10" fill="${barCol}" rx="2"/>`;
    s+=`<text x="${4+totalW+4}" y="${y+22}" fill="#8B949E" font-size="8.5">${b.wkts} wkts · ${b.wp}% wins</text>`;
  });
  s+=`<rect x="4" y="${H-10}" width="8" height="6" fill="#D4AF37" rx="1"/><text x="15" y="${H-5}" fill="#8B949E" font-size="9">Gold/Blue = wickets in wins</text>`;
  s+=`<rect x="160" y="${H-10}" width="8" height="6" fill="#2D333B" rx="1"/><text x="171" y="${H-5}" fill="#8B949E" font-size="9">In losses</text>`;
  s+=`</svg>`;return s;
}

function svgToss(){
  const W=310,H=190;
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block"><rect width="${W}" height="${H}" fill="#0f1117"/>`;
  // Title - two lines so it doesn't get cut
  s+=`<text x="4" y="13" fill="#E6EDF3" font-size="8.5" font-weight="700">Left: overall toss win rates.  Centre: win rates by decision.</text>`;
  s+=`<text x="4" y="24" fill="#E6EDF3" font-size="8.5" font-weight="700">Right: field-first win rate by season 2021–2026.</text>`;

  // Panel A: overall (left third)
  s+=`<text x="55" y="36" text-anchor="middle" fill="#8B949E" font-size="8.5">Overall win rate</text>`;
  [[50.5,'#238636','Toss Winners'],[49.5,'#DA3633','Toss Losers']].forEach(([v,c,l],i)=>{
    const x=12+i*54; const bH=(v-35)*2.2; const y=128-bH;
    s+=`<rect x="${x}" y="${y}" width="44" height="${bH}" fill="${c}" rx="2" opacity="0.85"/>`;
    s+=`<text x="${x+22}" y="${y-5}" text-anchor="middle" fill="${c}" font-size="10.5" font-weight="700">${v}%</text>`;
    s+=`<text x="${x+22}" y="143" text-anchor="middle" fill="#8B949E" font-size="8.5">${l}</text>`;
  });

    s+=`<text x="${x+23}" y="${y-5}" text-anchor="middle" fill="${c}" font-size="10.5" font-weight="700">${v}%</text>`;
    s+=`<text x="${x+23}" y="143" text-anchor="middle" fill="#8B949E" font-size="8.5">${l}</text>`;
  });

  s+=`<line x1="130" y1="${base50y}" x2="244" y2="${base50y}" stroke="#D4AF37" stroke-dasharray="3" opacity="0.6"/>`;
  s+=`<text x="192" y="158" text-anchor="middle" fill="#D4AF37" font-size="9.5" font-weight="700">+9.4pp field vs bat</text>`;

  s+=`<line x1="250" y1="28" x2="250" y2="155" stroke="#21262D"/>`;

  // Panel C: season trend (right) - last 6 seasons with more spacing
  s+=`<text x="280" y="36" text-anchor="middle" fill="#8B949E" font-size="8.5">Season trend</text>`;
  const trendH=HERD.slice(-6);
  const tW=8; const tGap=(W-252-8)/trendH.length;
  trendH.forEach((d,i)=>{
    const x=254+i*tGap; const bH=(d.wr-35)/40*75; const y=128-bH;

  });

  s+=`</svg>`;return s;
}

// ── ENGINE ────────────────────────────────────────────────────────
let cur=0,locking=false;

function makePage(p){
  const wrap=document.createElement('div');
  wrap.style.cssText='position:absolute;inset:0;display:flex';
  const L=document.createElement('div');
  L.style.cssText='width:50%;height:100%;overflow:hidden;position:relative';
  L.innerHTML=p.left;
  const R=document.createElement('div');
  R.style.cssText='width:50%;height:100%;overflow:hidden;position:relative;border-left:1px solid rgba(212,175,55,0.12)';
  R.innerHTML=p.right;
  wrap.appendChild(L);wrap.appendChild(R);
  return wrap;
}

function goTo(idx){
  if(locking||idx===cur||idx<0||idx>=PAGES.length)return;
  locking=true;
  const cont=document.getElementById('pages');
  const old=cont.lastChild;
  const dir=idx>cur?1:-1;
  cur=idx;
  const np=makePage(PAGES[idx]);
  np.children[0].style.transform=`translateY(${dir*100}%)`;
  np.children[1].style.transform=`translateY(${-dir*100}%)`;
  np.children[0].style.transition='transform 0.9s cubic-bezier(0.76,0,0.24,1)';
  np.children[1].style.transition='transform 0.9s cubic-bezier(0.76,0,0.24,1)';
  cont.appendChild(np);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    np.children[0].style.transform='translateY(0)';
    np.children[1].style.transform='translateY(0)';
    if(old){
      old.children[0].style.transition='transform 0.9s cubic-bezier(0.76,0,0.24,1)';
      old.children[1].style.transition='transform 0.9s cubic-bezier(0.76,0,0.24,1)';
      old.children[0].style.transform=`translateY(${-dir*100}%)`;
      old.children[1].style.transform=`translateY(${dir*100}%)`;
    }
    // silk
    const sc=document.getElementById('silk');
    sc.style.opacity=PAGES[cur].silk?'0.45':'0';
  }));
  setTimeout(()=>{if(old)old.remove();updateUI();locking=false;},950);
}

function updateUI(){
  const btns=document.getElementById('dots').children;
  Array.from(btns).forEach((b,i)=>{
    b.style.background=i===cur?'#D4AF37':'#21262D';
    b.style.transform=i===cur?'scale(1.5)':'scale(1)';
  });
  document.getElementById('lbl').textContent=PAGES[cur].label+' · '+(cur+1)+'/'+PAGES.length;
  document.getElementById('pagetag').textContent='IPL CRUNCH \'26 · '+PAGES[cur].label;
}

// build dots
const dc=document.getElementById('dots');
PAGES.forEach((_,i)=>{
  const b=document.createElement('button');
  b.style.cssText='width:7px;height:7px;border-radius:50%;border:none;cursor:pointer;transition:all 0.3s;padding:0;background:#21262D';
  b.onclick=()=>goTo(i);
  dc.appendChild(b);
});

// spiral
(function(){
  const svg=document.getElementById('sp');
  const NS="http://www.w3.org/2000/svg";
  const DOTS=280,SZ=200,CENTER=100,MAX_R=90,G=Math.PI*(3-Math.sqrt(5));
  for(let i=0;i<DOTS;i++){
    const idx=i+0.5,f=idx/DOTS,r=Math.sqrt(f)*MAX_R,theta=idx*G;
    const c=document.createElementNS(NS,'circle');
    c.setAttribute('cx',(CENTER+r*Math.cos(theta)).toFixed(2));
    c.setAttribute('cy',(CENTER+r*Math.sin(theta)).toFixed(2));
    c.setAttribute('r','1.6');c.setAttribute('fill','#D4AF37');c.setAttribute('opacity','0.3');
    const aR=document.createElementNS(NS,'animate');
    aR.setAttribute('attributeName','r');aR.setAttribute('values','0.7;2.4;0.7');
    aR.setAttribute('dur','3s');aR.setAttribute('begin',`${f*3}s`);aR.setAttribute('repeatCount','indefinite');
    aR.setAttribute('calcMode','spline');aR.setAttribute('keySplines','0.4 0 0.6 1;0.4 0 0.6 1');
    const aO=document.createElementNS(NS,'animate');
    aO.setAttribute('attributeName','opacity');aO.setAttribute('values','0.15;1;0.15');
    aO.setAttribute('dur','3s');aO.setAttribute('begin',`${f*3}s`);aO.setAttribute('repeatCount','indefinite');
    aO.setAttribute('calcMode','spline');aO.setAttribute('keySplines','0.4 0 0.6 1;0.4 0 0.6 1');
    c.appendChild(aR);c.appendChild(aO);svg.appendChild(c);
  }
})();

// silk canvas
(function(){
  const canvas=document.getElementById('silk');
  const ctx=canvas.getContext('2d');
  let t=0;
  function resize(){canvas.width=canvas.offsetWidth||680;canvas.height=canvas.offsetHeight||600;}
  resize();
  function draw(){
    const W=canvas.width,H=canvas.height;
    if(!W||!H){requestAnimationFrame(draw);return;}
    const img=ctx.createImageData(W,H);const d=img.data;
    const noise=(x,y)=>{const G=2.71828;return(G*Math.sin(G*x)*G*Math.sin(G*y)*(1+x))%1;};
    for(let x=0;x<W;x+=4)for(let y=0;y<H;y+=4){
      const u=(x/W)*2.2,v=(y/H)*2.2,tOff=0.018*t;
      const p=0.5+0.5*Math.sin(5*(u+v+Math.cos(3*u+5*v)+0.015*tOff)+Math.sin(20*(u+v-0.08*tOff)));
      const intensity=Math.max(0,p-noise(x,y)/18*0.9);
      for(let dx=0;dx<4;dx++)for(let dy=0;dy<4;dy++){
        const idx=((y+dy)*W+(x+dx))*4;
        if(idx<d.length){d[idx]=Math.floor(90*intensity);d[idx+1]=Math.floor(80*intensity);d[idx+2]=Math.floor(30*intensity);d[idx+3]=255;}
      }
    }
    ctx.putImageData(img,0,0);
    const ov=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)/2);
    ov.addColorStop(0,'rgba(0,0,0,0)');ov.addColorStop(1,'rgba(0,0,0,0.55)');
    ctx.fillStyle=ov;ctx.fillRect(0,0,W,H);
    t++;requestAnimationFrame(draw);
  }
  draw();
})();

// launch after spiral
setTimeout(()=>{
  const loader=document.getElementById('loader');
  loader.style.transition='opacity 0.7s,transform 0.7s';
  loader.style.opacity='0';loader.style.transform='scale(1.04)';
  setTimeout(()=>{
    loader.style.display='none';
    const db=document.getElementById('db');
    db.style.display='block';db.style.opacity='0';
    db.style.transition='opacity 0.7s';
    setTimeout(()=>db.style.opacity='1',50);
    document.getElementById('pages').appendChild(makePage(PAGES[0]));
    updateUI();
    document.getElementById('silk').style.opacity='0.45';
    setTimeout(()=>{const h=document.getElementById('khint');if(h)h.style.opacity='0';},5000);
    const app=document.getElementById('app');
    app.addEventListener('wheel',e=>{e.preventDefault();goTo(cur+(e.deltaY>0?1:-1));},{passive:false});
    document.addEventListener('keydown',e=>{
      if(e.key==='ArrowDown'||e.key==='PageDown')goTo(cur+1);
      if(e.key==='ArrowUp'||e.key==='PageUp')goTo(cur-1);
    });
    // Touch swipe support
    let tY=0;
    app.addEventListener('touchstart',e=>{tY=e.touches[0].clientY;},{passive:true});
    app.addEventListener('touchend',e=>{const dy=tY-e.changedTouches[0].clientY;if(Math.abs(dy)>40)goTo(cur+(dy>0?1:-1));},{passive:true});
  },700);
},3600);
</script>
